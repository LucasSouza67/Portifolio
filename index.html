<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus links - Lucas Souza</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="shortcut icon" href="favicon_io/favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="loading-screen">
        <div id="loading-bar"></div>
        <div id="loading-text">0%</div>
    </div>
    <div class="container">
        <div class="content">
            <div class="widget1">
                <div class="info-user">
                    <div class="name-user">
                        <h1>Lucas Souza</h1>
                        <span>Programador</span>
                    </div>
                </div>
                <div class="info-icon">
                    <img src="favicon_io/favicon-32x32.png" alt="icon">
                </div>
            </div>
            <div class="widget2">
                <div class="hard-skills">
                    <span class="destaque">Hard Skills</span>
                    <div class="skills-icons">
                        <i class="fab fa-java"></i>
                        <i class="fab fa-js"></i>
                        <i class="devicon-sqldeveloper-plain"></i>
                        <i class="fab fa-react"></i>
                    </div>
                </div>
                <div class="soft-skills">
                    <span class="destaque">Soft Skills</span>
                    <div class="skills-icons">
                        <i class="devicon-python-plain"></i>
                        <i class="fab fa-js"></i>
                        <i class="devicon-github-plain""></i>
                        <i class="fab fa-bootstrap"></i>
                    </div>
                </div>
            </div>
            <div class="widget3">
                <div class="redes-sociais">
                    <a class="box-social linkedin" href="https://www.linkedin.com/in/lucas-souza-1b5b862b4/" target="_blank" rel="external"><i
                        class="fab fa-linkedin-in"></i></a>
                    <a class="box-social instagram" href="https://www.instagram.com" target="_blank" rel="external"><i
                            class="fab fa-instagram"></i></a>
                    <a class="box-social github" href="https://github.com/LucasSouza67" target="_blank" rel="external"><i
                            class="fab fa-github"></i></a>
                </div>
            </div>
            <div class="widget4">
                <a href="" class="meu-site" target="_blank">
                    <img src="img/web-black-icon.png" alt="web">
                    <h1>Meu portfolio</h1>
                </a>
            </div>
    </div>
    <script src="animationLoading.js"></script>
</body>
</html>
